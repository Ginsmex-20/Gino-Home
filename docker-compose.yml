version: '3.8'

services:

  # ── Backend (Express + SQLite) ────────────────────────
  backend:
    build: ./backend
    container_name: ginohome-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/ginohome.db
      - UPLOADS_PATH=/app/data/uploads
      - JWT_SECRET=${JWT_SECRET:-bitte-in-.env-aendern-!}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - ./data:/app/data
    networks:
      - ginohome

  # ── Frontend (React + nginx + SSL) ───────────────────
  frontend:
    build: ./frontend
    container_name: ginohome-frontend
    restart: unless-stopped
    ports:
      - "8080:80"    # HTTP (ACME-Challenge + Redirect)
      - "8443:443"   # HTTPS
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - ginohome

  # ── Certbot (SSL-Zertifikat automatisch erneuern) ────
  certbot:
    image: certbot/certbot
    container_name: ginohome-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

networks:
  ginohome:
    driver: bridge

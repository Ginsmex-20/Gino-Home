version: '3.8'

services:

  # ── Backend (Express + SQLite) ────────────────────────
  backend:
    build: ./backend
    container_name: ginohome-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/ginohome.db
      - UPLOADS_PATH=/app/data/uploads
      - JWT_SECRET=${JWT_SECRET:-bitte-in-.env-aendern-!}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - NEXTCLOUD_URL=${NEXTCLOUD_URL:-}
      - NEXTCLOUD_USER=${NEXTCLOUD_USER:-}
      - NEXTCLOUD_PASS=${NEXTCLOUD_PASS:-}
    volumes:
      - ./data:/app/data
    networks:
      - ginohome

  # ── Frontend (React + nginx) ─────────────────────────
  frontend:
    build: ./frontend
    container_name: ginohome-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - ginohome
    depends_on:
      - backend

  # ── Cloudflare Tunnel (externer Zugang) ──────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ginohome-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    networks:
      - ginohome
    depends_on:
      - frontend

networks:
  ginohome:
    driver: bridge

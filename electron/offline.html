<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gino-Home – Nicht erreichbar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 0;
    user-select: none;
    -webkit-app-region: drag;
    position: relative;
    overflow: hidden;
  }

  /* Ambient Blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(120px);
    animation: blob 14s ease-in-out infinite;
  }
  .blob-1 {
    top: -160px; left: -120px;
    width: 420px; height: 420px;
    background: rgba(249,115,22,0.30);
  }
  .blob-2 {
    bottom: -180px; right: -140px;
    width: 460px; height: 460px;
    background: rgba(234,88,12,0.22);
    animation-delay: -6s;
  }
  @keyframes blob {
    0%,100% { transform: translate(0,0) scale(1); }
    33%     { transform: translate(40px,-50px) scale(1.1); }
    66%     { transform: translate(-30px,30px) scale(0.95); }
  }

  /* Grid pattern overlay */
  .grid-pattern {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000, transparent 70%);
    mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000, transparent 70%);
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(20,20,24,0.55);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    backdrop-filter: blur(18px) saturate(150%);
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 24px 64px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    border-radius: 28px;
    padding: 40px 44px;
    max-width: 460px;
    width: calc(100% - 40px);
    text-align: center;
    -webkit-app-region: no-drag;
  }

  .icon-wrap {
    width: 76px; height: 76px;
    border-radius: 22px;
    background: linear-gradient(135deg, rgba(249,115,22,0.25) 0%, rgba(249,115,22,0.10) 100%);
    border: 1px solid rgba(249,115,22,0.30);
    box-shadow: 0 8px 28px rgba(249,115,22,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  svg.logo { width: 38px; height: 38px; }

  h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: -0.4px;
    background: linear-gradient(135deg, #fff 0%, #fb923c 60%, #f97316 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
  p strong { color: #cbd5e1; }

  .checklist {
    text-align: left;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .checklist-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: #94a3b8;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(249,115,22,0.5);
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(249,115,22,0.4);
  }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #fb923c 0%, #f97316 50%, #ea580c 100%);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 6px 22px rgba(249,115,22,0.40), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 0.1s, box-shadow 0.2s, filter 0.2s;
    -webkit-app-region: no-drag;
  }
  .btn:hover  { filter: brightness(1.06); box-shadow: 0 8px 28px rgba(249,115,22,0.50), inset 0 1px 0 rgba(255,255,255,0.2); }
  .btn:active { transform: scale(0.97); }

  .version { margin-top: 24px; font-size: 11px; color: #475569; }
</style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="grid-pattern"></div>

  <div class="card">
    <div class="icon-wrap">
      <!-- Orange Home-Icon -->
      <svg class="logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 5L4 16.5V31H13.5V22.5H22.5V31H32V16.5L18 5Z" fill="#f97316"/>
      </svg>
    </div>

    <h1>Gino-Home nicht erreichbar</h1>
    <p>Die Verbindung zu <strong>ginohome.de</strong> konnte nicht hergestellt werden.<br>Bitte prüfe Folgendes:</p>

    <div class="checklist">
      <div class="checklist-item"><div class="dot"></div>Internetverbindung aktiv?</div>
      <div class="checklist-item"><div class="dot"></div>TrueNAS-Server läuft?</div>
      <div class="checklist-item"><div class="dot"></div>Cloudflare-Tunnel aktiv? (<code style="font-size:11px;color:#64748b">docker compose ps</code>)</div>
      <div class="checklist-item"><div class="dot"></div>ginohome.de im Browser erreichbar?</div>
    </div>

    <button class="btn" onclick="location.href='https://ginohome.de'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
      </svg>
      Erneut verbinden
    </button>

    <p class="version">Gino-Home Desktop</p>
  </div>
</body>
</html>

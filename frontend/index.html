<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Gino-Home</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme & Status Bar -->
    <meta name="theme-color" content="#f97316" />
    <meta name="background-color" content="#161616" />
    <meta name="msapplication-TileColor" content="#f97316" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HaushaltsHub" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />

    <!-- Favicon / Logo -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />

    <style>
      html, body { background-color: #0f0f0f; margin: 0; overflow-x: hidden; }

      /* ── MOBILE: Sidebar verstecken ────────────────────────────── */
      @media (max-width: 767px) {
        .sidebar-desktop         { display: none !important; }
        .mobile-header           { display: flex !important; }
        .bottom-nav-bar          { display: flex !important; }
        .mobile-overlay-sidebar  { display: block !important; }
      }

      /* ── DESKTOP: Mobile-Elemente verstecken ──────────────────── */
      @media (min-width: 768px) {
        .mobile-header           { display: none !important; }
        .bottom-nav-bar          { display: none !important; }
        .mobile-overlay-sidebar  { display: none !important; }
        .page-content            { padding: 24px !important; padding-bottom: 24px !important; }
      }

      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(40px); }
        to   { opacity: 1; transform: translateX(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Komprimierung
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # API-Anfragen zum Backend weiterleiten
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Socket.io WebSocket + Polling (Echtzeit)
    location /socket.io/ {
        proxy_pass http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Uploads weiterleiten
    location /uploads/ {
        proxy_pass http://backend:3001/uploads/;
    }

    # React SPA — alle Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

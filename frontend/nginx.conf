server {
    listen 80;
    server_name ginohome.de www.ginohome.de;

    # Let's Encrypt ACME-Challenge (muss auf HTTP bleiben)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Alles andere → HTTPS weiterleiten
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ginohome.de;
    root /usr/share/nginx/html;
    index index.html;

    # SSL-Zertifikat (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/ginohome.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ginohome.de/privkey.pem;

    # Moderne SSL-Einstellungen
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # Gzip Komprimierung
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Maximale Upload-Größe (für Dokumente, Bilder, Videos)
    client_max_body_size 500M;

    # API-Anfragen zum Backend
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Socket.io WebSocket
    location /socket.io/ {
        proxy_pass http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Uploads
    location /uploads/ {
        proxy_pass http://backend:3001/uploads/;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}

name: Build Electron App

on:
  workflow_dispatch:

jobs:
  # ── Windows .exe ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Gino-Home-Setup-Windows
          path: dist-app/Gino-Home-Setup-*.exe
          retention-days: 90

  # ── Mac .dmg ────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Mac DMG
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: Gino-Home-Mac
          path: dist-app/Gino-Home-*.dmg
          retention-days: 90
